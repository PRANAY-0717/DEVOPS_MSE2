name: Pranay CI/CD Pipeline
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Set up Node.js version 18
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install project dependencies
        run: npm install
      - name: Build the Docker image tagged as nodejs-api
        run: docker build -t nodejs-api .
      - name: Print message
        run: echo "Pranay is deploying application to server..."
